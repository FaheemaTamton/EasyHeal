{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --theme-color: #8FABD4;
      --theme-hover: #4A70A9;
    }

    body {
  min-height: 100vh;

  background:
    linear-gradient(
      rgba(248, 250, 255, 0.85),
      rgba(248, 250, 255, 0.85)
    ),
    url("{% static 'core/7.jpg' %}");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}


    .profile-card {
       position: relative;
       z-index: 1;
      width: 100%;
      max-width: 520px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    

    .profile-header {
      padding: 32px 24px;
      background-color: var(--theme-color);
      color: #ffffff;
      text-align: center;
    }

    .profile-header h4 {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .profile-header p {
      font-size: 14px;
      margin-bottom: 0;
      opacity: 0.9;
    }

    .profile-body {
      padding: 24px;
    }

    .info-row {
      margin-bottom: 16px;
    }

    .info-label {
      font-weight: 600;
      color: #555;
      display: block;
      margin-bottom: 4px;
    }

    .info-value {
      background: #f8f9fb;
      border-radius: 8px;
      padding: 10px 12px;
      color: #333;
    }

    .theme-btn {
      background-color: var(--theme-color);
      color: #fff;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      transition: 0.3s ease;
    }

    .theme-btn:hover {
      background-color: var(--theme-hover);
    }
  
    .edit-profile-btn {
  background-color: #4A70A9;   /* darker blue */
  color: #ffffff;
}

.edit-profile-batn:hover {
  background-color: #8FABD4;   /* lighter hover */
  color: #ffffff;
}

.profile-details-box {
  background-color: #f9fafb;
  border-radius: 10px;
  padding: 14px 16px;
  margin-top: 12px;
}

.profile-detail-line {
  margin-bottom: 6px;
  font-size: 14px;
  color: #333;
}

.profile-detail-line:last-child {
  margin-bottom: 0;
}

  </style>
