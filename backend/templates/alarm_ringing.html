{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alarm Ringing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
  --theme-color: #8FABD4;
  --theme-hover: #4A70A9;
}

/* ===== FULL SCREEN ===== */
body {
  min-height: 100vh;
  margin: 0;
  background:
    linear-gradient(rgba(248,250,255,.92), rgba(248,250,255,.92)),
    url("{% static 'core/7.jpg' %}");
  background-size: cover;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== CONTAINER ===== */
.alarm-container {
  max-width: 420px;
  width: 100%;
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,.12);
  padding: 28px;
  text-align: center;
}

/* ===== HEADER ===== */
.alarm-header {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--theme-hover);
  margin-bottom: 8px;
}

.alarm-pulse {
  font-size: 42px;
  animation: pulse 1.4s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

/* ===== PATIENT ===== */
.patient-name {
  font-size: 0.95rem;
  color: #6b7280;
  margin-bottom: 16px;
}

/* ===== MEDICINE CARD ===== */
.medicine-card {
  background: #f9fafb;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
}

.medicine-name {
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 4px;
}

.medicine-info {
  font-size: 0.95rem;
  color: #374151;
}

.time-badge {
  margin-top: 10px;
  display: inline-block;
  padding: 6px 14px;
  border-radius: 999px;
  background: var(--theme-color);
  color: #fff;
  font-weight: 600;
  font-size: 0.9rem;
}

/* ===== ACTION BUTTONS ===== */
.alarm-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.btn-taken {
  background: #22c55e;
  color: #fff;
  font-weight: 700;
  border-radius: 12px;
  padding: 12px;
  border: none;
}

.btn-snooze {
  background: #facc15;
  color: #1f2937;
  font-weight: 700;
  border-radius: 12px;
  padding: 12px;
  border: none;
}

.btn-skip {
  background: #ef4444;
  color: #fff;
  font-weight: 700;
  border-radius: 12px;
  padding: 12px;
  border: none;
}
</style>
</head>

<body>



<script>
const alarmSound = new Audio("{% static 'sounds/alarm.mp3' %}");
alarmSound.loop = true;
alarmSound.play();

/* STOP SOUND */
function stopAlarm() {
  alarmSound.pause();
  alarmSound.currentTime = 0;
}

/* TAKEN */
document.getElementById("takenBtn").onclick = () => {
  stopAlarm();
  alert("Medicine marked as taken.");
};

/* SNOOZE */
document.getElementById("snoozeBtn").onclick = () => {
  stopAlarm();
  alert("Alarm snoozed for 10 minutes.");
};

/* SKIP */
document.getElementById("skipBtn").onclick = () => {
  stopAlarm();
  if (confirm("Are you sure you want to skip this dose?")) {
    alert("Dose marked as skipped.");
  }
};
</script>


</body>
</html>
