{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EasyHeal | Login</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-blue: #4A70A9;
      --dark-blue: #1F2A44;
      --light-blue: #EAF2FF;
      --bg-light: #F8FAFF;
      --border-light: #E0E7FF;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;

      background:
        linear-gradient(
          rgba(248, 250, 255, 0.20),
          rgba(248, 250, 255, 0.20)
        ),
        url("{% static 'core/7.jpg' %}");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .container {
      position: relative;
      z-index: 1;
    }

    .card {
      border: 1px solid var(--border-light);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(47, 128, 237, 0.08);
      margin-top: 100px;
      background-color: #ffffff;
    }

    .easyheal-logo-text {
      font-size: 30px;
      font-weight: 700;
      color: var(--primary-blue);
      text-align: center;
      margin-top: 28px;
    }

    .easyheal-subtext {
      text-align: center;
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .form-control {
      background-color: #ffffff;
      padding: 14px 16px;
      margin-bottom: 1.2rem;
      border-radius: 8px;
      border: 1px solid var(--border-light);
    }

    .btn-primary {
      background-color: var(--primary-blue);
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-weight: 500;
      width: 100%;
    }

    .btn-primary:hover {
      background-color: #8FABD4;
    }

    .extra-links {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
    }

    a {
      color: var(--primary-blue);
      font-weight: 500;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">

      <div class="card">
        <div class="easyheal-logo-text">EasyHeal</div>
        <div class="easyheal-subtext">
          Caregiver / Health Center Login
        </div>

        <div class="card-body px-4 pb-4">

          <!-- 🔴 DJANGO LOGIN FORM -->
          <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            {% if error %}
              <div class="alert alert-danger">
                {{ error }}
              </div>
            {% endif %}

            {% if messages %}
              {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                  {{ message }}
                </div>
              {% endfor %}
            {% endif %}

            <input
              type="text"
              name="username"
              class="form-control"
              placeholder="Username"
              required
            >

            <input
              type="password"
              name="password"
              class="form-control"
              placeholder="Password"
              required
            >

            <button type="submit" class="btn btn-primary mt-2">
              Login
            </button>

            <div class="extra-links">
              <a href="#">Forgot password?</a>
              <a href="{% url 'register' %}">Create account</a>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
